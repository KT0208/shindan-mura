<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff67ad"/>
      <stop offset="100%" stop-color="#8f4ed8"/>
    </linearGradient>
  </defs>
  <!-- 背景: ブランドグラデーションの角丸スクエア -->
  <rect width="48" height="48" rx="10" fill="url(#bg)"/>
  <!-- 鳥居(診断村の入口) -->
  <g fill="#ffffff">
    <!-- 笠木(上の横木・少し反り) -->
    <path d="M6 12 Q24 8.5 42 12 L41 16.5 Q24 13.5 7 16.5 Z"/>
    <!-- 島木の下の貫 -->
    <rect x="10.5" y="21.5" width="27" height="4"/>
    <!-- 左柱 -->
    <path d="M12 15.5 L16.5 15.5 L17.5 40 L11 40 Z"/>
    <!-- 右柱 -->
    <path d="M31.5 15.5 L36 15.5 L37 40 L30.5 40 Z"/>
    <!-- 額束(中央の札) -->
    <rect x="21.5" y="16.5" width="5" height="7" rx="1"/>
  </g>
</svg>
