name: X Auto Post

on:
  schedule:
    # 毎日 12:00 JST (03:00 UTC) に1投稿
    - cron: '0 3 * * *'
    # 火・水・木の 20:00 JST (11:00 UTC) に追加でもう1投稿
    - cron: '0 11 * * 2,3,4'
  # 手動実行やテストのためのトリガー(Actionsタブから実行可能)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: x-auto-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Post to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: npm run post:x

      - name: Commit updated post history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/social-history.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update social post history [skip ci]"
            git push
          else
            echo "No history changes to commit."
          fi
